name: 'repo-doctor'
description: 'Audit a GitHub repository (and optionally its org) against health & governance checks. Read-only.'
author: 'repo-doctor contributors'
branding:
  icon: 'activity'
  color: 'green'
inputs:
  config:
    description: 'Path to repo-doctor config file (yaml). Defaults to .github/repo-doctor.yml'
    required: false
  preset:
    description: 'Preset to apply: minimal | standard | strict | off. Overridden by config file if present.'
    required: false
  fail-on:
    description: 'Severity that should cause a non-zero exit: error | warn | never. Default: error.'
    required: false
    default: 'error'
  github-token:
    description: 'Token used for repo-level API calls. Defaults to the GITHUB_TOKEN environment variable; set it in the workflow env or pass this input explicitly.'
    required: false
  org-token:
    description: 'Optional token with admin:org read for org-level checks.'
    required: false
  format:
    description: 'Report format(s), comma-separated: text | json | markdown | sarif. Default: text,markdown.'
    required: false
    default: 'text,markdown'
  output:
    description: 'Optional path to write the report. Markdown is also written to $GITHUB_STEP_SUMMARY when available.'
    required: false
  target:
    description: 'What to audit: "repo" (default, the current repo), "org" (every repo in the org), or "list" (explicit `repos` list).'
    required: false
    default: 'repo'
  org:
    description: 'Org name when target=org. Defaults to the current repo owner.'
    required: false
  repos:
    description: 'Explicit list of repos to audit (whitespace- or comma-separated, each "owner/name"). If set, target defaults to "list".'
    required: false
  include-archived:
    description: 'When target=org, also audit archived repos. Default: false.'
    required: false
    default: 'false'
  repo-filter:
    description: 'When target=org, optional regex of repo names to include (e.g. "^lib-"). Default: all repos.'
    required: false
  max-repos:
    description: 'When target=org or target=list, cap the number of repos audited (safety valve). Default: 200.'
    required: false
    default: '200'
outputs:
  passed:
    description: 'Number of checks that passed.'
  failed:
    description: 'Number of checks that failed.'
  warnings:
    description: 'Number of failing checks at warn severity.'
  errors:
    description: 'Number of failing checks at error severity.'
  report-path:
    description: 'Path to the written report, if any.'
runs:
  using: 'node24'
  main: 'dist/index.js'
